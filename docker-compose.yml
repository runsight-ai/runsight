services:
  init-permissions:
    image: busybox
    user: "0"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    volumes:
      - ./:/workspace
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /workspace"]

  runsight:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    environment:
      - RUNSIGHT_BASE_PATH=/workspace
      - RUNSIGHT_LOG_FORMAT=text
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 2
    init: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
