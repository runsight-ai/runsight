services:
  runsight:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    environment:
      - RUNSIGHT_BASE_PATH=/workspace
      - RUNSIGHT_LOG_FORMAT=text
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
