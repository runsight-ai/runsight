version: '1.0'
tools:
  - slack_payload_builder
  - slack_webhook
souls:
  slack_notifier:
    id: slack_notifier
    role: Slack Reporter
    system_prompt: >
      Post the provided summary to Slack using the tools available to you.
      Use slack_payload_builder to format the message, then slack_webhook to send it.
    provider: openai
    model_name: gpt-5.4-nano
    tools:
      - slack_payload_builder
      - slack_webhook
blocks:
  research:
    type: linear
    soul_ref: researcher
  write_summary:
    type: linear
    soul_ref: writer
  quality_review:
    type: gate
    soul_ref: reviewer
    eval_key: write_summary
  notify:
    type: linear
    soul_ref: slack_notifier
workflow:
  name: Research & Review
  entry: research
  transitions:
    - from: research
      to: write_summary
    - from: write_summary
      to: quality_review
    - from: quality_review
      to: notify
