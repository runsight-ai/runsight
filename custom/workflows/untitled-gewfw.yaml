blocks:
  quality_review:
    eval_key: write_summary
    soul_ref: reviewer
    type: gate
  research:
    soul_ref: researcher
    type: linear
  write_summary:
    soul_ref: writer
    type: linear
souls:
  researcher:
    id: researcher_1
    role: Senior Researcher
    system_prompt: 'You are an expert researcher. Given a topic, provide a concise,
      well-structured summary of the key findings, trends, and insights. Cite sources
      where possible. Be thorough but concise.

      '
  reviewer:
    id: reviewer_1
    role: Quality Reviewer
    system_prompt: 'Evaluate if the content meets quality standards. Check for accuracy,
      completeness, and clarity. Provide specific feedback.

      '
  writer:
    id: writer_1
    role: Summary Writer
    system_prompt: 'You are a skilled technical writer. Take research findings and
      transform them into a polished, readable summary. Structure your output with
      clear sections, highlights, and a conclusion. Keep the summary under 500 words.

      '
version: '1.0'
workflow:
  entry: research
  name: Research & Review
  transitions:
  - from: research
    to: write_summary
  - from: write_summary
    to: quality_review
