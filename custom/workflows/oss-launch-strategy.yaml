version: "1.0"

config:
  model_name: claude-haiku-4-5-20251001

tools:
  - file_io

souls:
  researcher:
    id: researcher_1
    role: Web Researcher
    system_prompt: |
      You are a web research specialist. Research effective strategies for
      launching open source projects. Focus on: distribution channels,
      community building, first-week tactics, and promotion.
      IMPORTANT: Do NOT use the HTTP tool — rely on your training knowledge.
      Keep your response under 1000 words.
    max_tool_iterations: 0

  synthesizer:
    id: synthesizer_1
    role: Strategy Synthesizer
    system_prompt: |
      You are a strategy consultant. Take the research findings and produce
      a structured, actionable open source launch strategy document.
      Include sections: Pre-Launch Checklist, Launch Day Plan, Post-Launch
      (Week 1), Community Building, and Key Metrics to Track.
      Be specific and actionable — no generic advice.
      If you receive feedback from a previous round, address all issues.

  reviewer:
    id: reviewer_1
    role: Quality Gate Evaluator
    system_prompt: |
      You evaluate launch strategy documents for quality and completeness.
      Check for: actionable specifics (not generic advice), all required sections
      (pre-launch, launch day, post-launch, community, metrics), realistic
      timelines, and practical next steps.

      If the strategy meets quality standards, use the file_io tool to write
      the content to "custom/outputs/oss-launch-strategy.md", then respond
      with EXACTLY: PASS

      If it needs improvement, respond with EXACTLY: FAIL: <specific issues>
    tools:
      - file_io
    max_tool_iterations: 2

blocks:
  research:
    type: linear
    soul_ref: researcher

  synthesize:
    type: linear
    soul_ref: synthesizer

  review:
    type: gate
    soul_ref: reviewer
    eval_key: synthesize

  refine_loop:
    type: loop
    inner_block_refs:
      - synthesize
      - review
    max_rounds: 3
    break_on_exit: pass
    retry_on_exit: fail

workflow:
  name: OSS Launch Strategy
  entry: research
  transitions:
    - from: research
      to: refine_loop
