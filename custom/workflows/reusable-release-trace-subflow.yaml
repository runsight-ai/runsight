version: "1.0"
tools:
  - http
  - file_io
interface:
  inputs:
    - name: task
      target: current_task
    - name: manifest_json
      target: shared_memory.manifest_json
    - name: phase_payload
      target: shared_memory.phase_payload
  outputs:
    - name: packaged_result
      source: results.package_child_result
    - name: trace_path
      source: results.trace_path_value
    - name: quality_status
      source: results.child_quality_gate
blocks:
  dispatch_child_views:
    type: dispatch
    timeout_seconds: 60
    assertions:
      - type: contains-json
        value:
          type: array
          minItems: 2
          items:
            type: object
            required:
              - exit_id
              - output
    exits:
      - id: signal_scan
        label: Signal Scan
        soul_ref: release_web_analyst_openai
        task: >
          Working from the current task and available context, identify the most
          useful signals for a release digest. Prefer compact bullets that can be
          merged downstream.
      - id: risk_scan
        label: Risk Scan
        soul_ref: release_quality_reviewer_anthropic
        task: >
          Working from the current task and available context, identify caveats,
          contradictions, and cost/runtime concerns the final digest must include.

  child_merge:
    type: synthesize
    soul_ref: release_synthesizer_openai
    input_block_ids:
      - dispatch_child_views
    timeout_seconds: 60
    assertions:
      - type: regex
        value: \S
      - type: word-count
        value:
          min: 5

  materialize_child_phase_context:
    type: code
    timeout_seconds: 15
    assertions:
      - type: contains-json
        value:
          type: object
          required:
            - workflow_name
            - phase
            - trace_hint
            - trace_path
    code: |
      import json

      def _load_json(raw, fallback):
          if isinstance(raw, dict):
              return raw
          if isinstance(raw, str):
              try:
                  return json.loads(raw)
              except Exception:
                  return fallback
          return fallback

      def main(data):
          manifest = _load_json(data["shared_memory"].get("manifest_json", "{}"), {})
          phase_payload = _load_json(
              data["shared_memory"].get("phase_payload", "{}"),
              {},
          )
          return {
              "workflow_name": manifest.get("workflow_name", "Provider Pulse Release Digest"),
              "phase": phase_payload.get("phase", "unknown"),
              "trace_hint": phase_payload.get("trace_hint", "unknown"),
              "trace_path": phase_payload.get(
                  "trace_path",
                  "custom/outputs/reusable-release-trace-latest.md",
              ),
          }

  draft_child_summary:
    type: linear
    soul_ref: release_synthesizer_openai
    stateful: true
    timeout_seconds: 60
    assertions:
      - type: regex
        value: \S
      - type: word-count
        value:
          min: 5

  child_quality_gate:
    type: gate
    soul_ref: release_gate_anthropic
    eval_key: draft_child_summary
    timeout_seconds: 45
    assertions:
      - type: contains-any
        value:
          - PASS
          - "FAIL:"

  child_revision_loop:
    type: loop
    inner_block_refs:
      - materialize_child_phase_context
      - draft_child_summary
      - child_quality_gate
    max_rounds: 2
    break_on_exit: pass
    retry_on_exit: fail
    carry_context:
      enabled: true
      mode: all
      source_blocks:
        - materialize_child_phase_context
        - draft_child_summary
        - child_quality_gate
      inject_as: child_round_memory
    assertions:
      - type: regex
        value: ^completed_\d+_rounds$

  trace_path_value:
    type: code
    timeout_seconds: 10
    code: |
      import json

      def _load_json(raw, fallback):
          if isinstance(raw, dict):
              return raw
          if isinstance(raw, str):
              try:
                  return json.loads(raw)
              except Exception:
                  return fallback
          return fallback

      def main(data):
          phase_payload = _load_json(
              data["shared_memory"].get("phase_payload", "{}"),
              {},
          )
          return phase_payload.get(
              "trace_path",
              "custom/outputs/reusable-release-trace-latest.md",
          )

  route_trace_writer:
    type: code
    timeout_seconds: 10
    output_conditions:
      - case_id: primary
        condition_group:
          combinator: and
          conditions:
            - eval_key: phase
              operator: equals
              value: primary_pass
      - case_id: secondary
        condition_group:
          combinator: and
          conditions:
            - eval_key: phase
              operator: equals
              value: verification_pass
      - case_id: secondary
        default: true
    code: |
      import json

      def _load_json(raw, fallback):
          if isinstance(raw, dict):
              return raw
          if isinstance(raw, str):
              try:
                  return json.loads(raw)
              except Exception:
                  return fallback
          return fallback

      def main(data):
          phase_payload = _load_json(
              data["shared_memory"].get("phase_payload", "{}"),
              {},
          )
          return {
              "phase": phase_payload.get("phase", "unknown"),
              "trace_path": phase_payload.get(
                  "trace_path",
                  "custom/outputs/reusable-release-trace-latest.md",
              ),
          }

  write_primary_trace_file:
    type: linear
    soul_ref: release_trace_writer_primary_openai
    timeout_seconds: 45
    retry_config:
      max_attempts: 2
      backoff: fixed
      backoff_base_seconds: 1.0

  write_secondary_trace_file:
    type: linear
    soul_ref: release_trace_writer_secondary_openai
    timeout_seconds: 45
    assertions:
      - type: regex
        value: \S
    retry_config:
      max_attempts: 2
      backoff: fixed
      backoff_base_seconds: 1.0

  package_child_result:
    type: code
    timeout_seconds: 15
    assertions:
      - type: contains-json
        value:
          type: object
          required:
            - phase
            - trace_hint
            - summary
            - quality_status
            - trace_path
            - trace_write_result
    code: |
      import json

      def _load_json(raw, fallback):
          if isinstance(raw, dict):
              return raw
          if isinstance(raw, str):
              try:
                  return json.loads(raw)
              except Exception:
                  return fallback
          return fallback

      def main(data):
          phase_payload = _load_json(
              data["shared_memory"].get("phase_payload", "{}"),
              {"phase": "unknown", "trace_hint": "unknown"},
          )
          summary = data["results"].get("draft_child_summary", "")
          gate_result = data["results"].get("child_quality_gate", "")
          trace_write = data["results"].get("write_primary_trace_file", "")
          if not trace_write:
              trace_write = data["results"].get("write_secondary_trace_file", "")
          return {
              "phase": phase_payload.get("phase", "unknown"),
              "trace_hint": phase_payload.get("trace_hint", "unknown"),
              "summary": summary,
              "quality_status": gate_result,
              "trace_path": phase_payload.get(
                  "trace_path",
                  "custom/outputs/reusable-release-trace-latest.md",
              ),
              "trace_write_result": trace_write,
          }
workflow:
  name: Provider Trace Review Subflow
  entry: dispatch_child_views
  transitions:
    - from: dispatch_child_views
      to: child_merge
    - from: child_merge
      to: child_revision_loop
    - from: child_revision_loop
      to: trace_path_value
    - from: trace_path_value
      to: route_trace_writer
    - from: write_primary_trace_file
      to: package_child_result
    - from: write_secondary_trace_file
      to: package_child_result
    - from: package_child_result
      to: null
  conditional_transitions:
    - from: route_trace_writer
      primary: write_primary_trace_file
      secondary: write_secondary_trace_file
      default: write_secondary_trace_file
