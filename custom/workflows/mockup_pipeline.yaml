version: "1.0"

config:
  model_name: claude-haiku-4-5-20251001

blocks:
  inner_workflow:
    type: workflow
    workflow_ref: custom/workflows/mockup_generate_review.yaml
    inputs:
      current_task: current_task
    outputs:
      results.mockup_html: results.gate
    max_depth: 5

  retry_generate:
    type: loop
    inner_block_refs:
      - inner_workflow
    max_rounds: 2

  write_file:
    type: file_writer
    output_path: .agora/mockups/canvas_screen.html
    content_key: mockup_html

workflow:
  name: mockup_pipeline
  entry: retry_generate
  transitions:
    - from: retry_generate
      to: write_file
    - from: write_file
      to: null
