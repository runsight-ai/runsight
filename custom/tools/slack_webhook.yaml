version: "1.0"
id: slack_webhook
kind: tool
type: custom
executor: request
name: Slack Webhook
description: Send a message to the configured Slack incoming webhook.
parameters:
  type: object
  properties:
    payload_json:
      type: string
      description: Complete JSON payload to send to Slack, such as output from slack_payload_builder.
  required:
    - payload_json
request:
  method: POST
  url: "${SLACK_WEBHOOK_URL}"
  headers:
    Content-type: application/json
  body_template: "{{ payload_json }}"
timeout_seconds: 10
