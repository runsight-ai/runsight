name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/gui run build:bundle

      # Copy built frontend into Python package
      - run: cp -r apps/gui/dist apps/api/src/runsight_api/static

      # Set version from git tag (v0.1.2 → 0.1.2)
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" apps/api/pyproject.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" packages/core/pyproject.toml
          echo "Publishing version $VERSION"

      # Build and publish Python packages
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build

      # Build runsight-core first (dependency)
      - run: python -m build packages/core -o dist/

      # Build runsight (includes bundled frontend)
      - run: python -m build apps/api -o dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
