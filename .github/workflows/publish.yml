name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: runsight-ai/runsight

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"
      - run: python -m pip install uv
      - run: pnpm install --frozen-lockfile
      - run: uv sync --frozen --all-packages --all-groups
      - run: uv run python packages/core/scripts/generate_schema.py --check
      - run: uv run pytest apps/api/tests packages/core/tests -q
      - run: |
          export PATH="$PWD/.venv/bin:$PATH"
          pnpm run lint

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect version change
        id: check
        run: |
          NEW=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          OLD=$(git show HEAD~1:pyproject.toml 2>/dev/null | grep '^version' | head -1 | cut -d'"' -f2 || echo "")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD → $NEW"
          else
            echo "Version unchanged: $NEW"
          fi

  publish-pypi:
    needs: [test, check-version]
    if: needs.check-version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/gui run build:bundle

      # Copy built frontend into Python package
      - run: cp -r apps/gui/dist apps/api/src/runsight_api/static

      # Set version from root pyproject.toml
      - name: Set version in sub-packages
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" apps/api/pyproject.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" packages/core/pyproject.toml
          echo "Publishing version $VERSION"

      # Build and publish Python packages
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build hatchling setuptools
      - run: python -m build packages/core -o dist/
      - name: Build runsight wheel (with bundled frontend)
        run: |
          python -m build --no-isolation --wheel apps/api -o dist/
          python -m build --no-isolation --sdist apps/api -o dist/
          echo "--- Wheel contents (static check) ---"
          python -c "import zipfile,glob; whl=glob.glob('dist/runsight-*.whl')[0]; files=[f for f in zipfile.ZipFile(whl).namelist() if 'static' in f]; print(f'{len(files)} static files in wheel'); assert len(files) > 10, 'Frontend not bundled!'"

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-docker:
    needs: [test, check-version]
    if: needs.check-version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tags
        id: meta
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag:
    needs: [check-version, publish-pypi, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create git tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
